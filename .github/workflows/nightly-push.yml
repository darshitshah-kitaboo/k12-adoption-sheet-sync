name: nightly-push

# Runs every night at 2:00 AM IST (20:30 UTC previous day).
# Also runs on any push to main so you can verify changes immediately.
# You can also trigger it manually from the Actions tab.

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'adoption_data.json'
      - 'scripts/refresh_and_push.py'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth
          
      - name: Validate data
        run: |
          python scripts/validate.py

      - name: Run push script
        env:
          ADOPTION_SHEET_ID: ${{ secrets.ADOPTION_SHEET_ID }}
          ADOPTION_SA_JSON: ${{ secrets.ADOPTION_SA_JSON }}
        run: |
          python scripts/refresh_and_push.py
