name: refresh-data

# Runs the state adapter coordinator from GitHub's US-based runner.
# Each adapter fetches its state's DOE page, parses it, and writes a
# fresh snapshot to scraped/<STATE>.json. If any meaningful field changed
# since the previous snapshot, a change log is written to logs/changes/.
#
# The coordinator does NOT touch adoption_data.json. That is the canonical
# human-curated file. The pipeline is deliberately read-only against it;
# a human reviews logs/changes/ and promotes confirmed updates.
#
# Triggers:
#   - Manual run from the Actions tab (workflow_dispatch)
#   - Daily at 13:00 UTC (6:30 PM IST, 9:00 AM ET) — same window as the
#     registry validator, different day slots to spread load.
#   - On any push that changes the coordinator, an adapter, or this file

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'
  push:
    paths:
      - 'scripts/run_adapters.py'
      - 'scripts/adapters/**'
      - '.github/workflows/refresh-data.yml'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run adapter smoke tests
        run: |
          python scripts/adapters/test_fl.py
          python scripts/adapters/test_tx.py
          python scripts/adapters/test_la.py
          python scripts/adapters/test_tn.py
          python scripts/adapters/test_ok.py
          python scripts/adapters/test_al.py
          python scripts/adapters/test_ms.py
          python scripts/adapters/test_sc.py
          python scripts/adapters/test_va.py
          python scripts/adapters/test_nc.py
          python scripts/adapters/test_ut.py

      - name: Run coordinator
        id: coord
        run: python scripts/run_adapters.py
        continue-on-error: true

      - name: Commit snapshots and change logs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraped/ logs/adapter_runs.jsonl logs/changes/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh state adapter snapshots [skip ci]"
          # Retry push with rebase when the runner's HEAD is behind main.
          # Happens when a human pushed while the workflow was running.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt, rebasing and retrying..."
            git pull --rebase origin main
          done
          echo "Push still failing after 3 rebase attempts" >&2
          exit 1

      - name: Fail the job if a required adapter failed
        if: steps.coord.outcome == 'failure'
        run: |
          echo "A required adapter failed. See logs/adapter_runs.jsonl."
          tail -1 logs/adapter_runs.jsonl || true
          exit 1
