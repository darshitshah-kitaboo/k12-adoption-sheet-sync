name: validate-registry

# Runs the URL validator from GitHub's US-based runner, which bypasses the
# geo-blocks and WAF rules that fail when running from non-US IPs.
#
# Triggers:
#   - Manual run from the Actions tab (workflow_dispatch)
#   - Weekly on Mondays at 14:00 UTC (7:30 PM IST)
#   - On any push that changes the registry or the validator itself

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'
  push:
    paths:
      - 'registry/sources.json'
      - 'scripts/validate_registry.py'
      - '.github/workflows/validate-registry.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run validator
        id: validate
        run: python scripts/validate_registry.py
        continue-on-error: true

      - name: Commit verification report and last_verified stamps
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/verification_report.json registry/sources.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh registry verification [skip ci]"
          # Retry push with rebase when the runner's HEAD is behind main.
          # Happens when a human pushed while the workflow was running.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt, rebasing and retrying..."
            git pull --rebase origin main
          done
          echo "Push still failing after 3 rebase attempts" >&2
          exit 1

      - name: Fail the job if priority-1 URLs failed
        if: steps.validate.outcome == 'failure'
        run: |
          echo "Priority-1 URLs failed. See registry/verification_report.json."
          exit 1
